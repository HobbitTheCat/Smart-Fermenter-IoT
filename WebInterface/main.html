<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Плитки как в Grafana</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<main>
    <div class="tile-container">
        <div class="tile large-tile">
            <div class="tile-grid">
                <div class="tile small-tile" id="internal1">
                    <div class="temperature-control">
                        <div class="value-and-buttons">
                            <div class="temperature">22°C</div>
                        </div>
                    </div>
                </div>
                <div class="tile small-tile" id="internal2">

                </div>
                <div class="tile small-tile" id="internal3"></div>
                <div class="tile wide-tile" id="internal4"></div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
